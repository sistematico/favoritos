name: Deploy PHP Site

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy PHP Site
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.SSH_HOST}}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          git clone -b api git@github.com:sistematico/favoritos.git /var/www/favoritos-api.lucasbrum.net/
          cd /var/www/favoritos-api.lucasbrum.net
          git checkout HEAD^ db/database.sqlite
          git pull origin api
          composer install