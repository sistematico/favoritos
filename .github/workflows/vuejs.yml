name: Deploy VueJS App

on: [push]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy VueJS Site
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.SSH_HOST}}
        username: ${{ secrets.SSH_USERNAME }}
        password: ${{ secrets.SSH_PASSWORD }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          git clone git@github.com:sistematico/fav.lucasbrum.net.git /var/www/fav.lucasbrum.net/
          mkdir -p /var/www/fav.lucasbrum.net/{html,dist}
          cd /var/www/fav.lucasbrum.net
          git checkout HEAD^ package-lock.json
          git checkout HEAD^ package.json
          git pull
          /usr/bin/node --optimize_for_size --max_old_space_size=128 --gc_interval=100 /usr/bin/npm install --no-optional --no-shrinkwrap --no-package-lock
          /usr/bin/node --optimize_for_size --max_old_space_size=128 --gc_interval=100 /usr/bin/npm run build
          rsync -av /var/www/fav.lucasbrum.net/dist/ /var/www/fav.lucasbrum.net/html/ --delete --exclude="txt/"