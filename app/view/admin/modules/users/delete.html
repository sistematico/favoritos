<h1>Excluir usuário</h1>
<hr>
<p></p>

<a class="btn btn-warning" href="{{URL}}/admin/users">Voltar</a>

<hr>

        <button type="submit" class="btn btn-danger">Excluir</button>
    </div>
</form>
