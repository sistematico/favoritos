<h1>{{title}}</h1>
<hr>
<p></p>

<a class="btn btn-warning" href="{{URL}}/admin/testimonies">Voltar</a>

<hr>

{{status}}

<form method="post">
    <div class="form-group">
        <label>Nome</label>
        <input name="nome" type="text" class="form-control" value="{{nome}}" required>
    </div>

    <div class="form-group my-3">
        <label>Mensagem</label>
        <textarea name="mensagem" type="text" class="form-control" cols="5" required>{{mensagem}}</textarea>
    </div>

    <div class="form-group">
        <button type="submit" class="btn btn-success">Enviar</button>
    </div>
</form>
