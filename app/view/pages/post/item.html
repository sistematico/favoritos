<div class="col">
  <div class="card bg-dark text-light">
    <img src="{{file}}" class="card-img-top" alt="{{title}}">
    <div class="card-body">
      <h5 class="card-title">{{title}} <small>{{author}} - {{date}}</small></h5>
      <p class="card-text">{{description}}</p>
    </div>
  </div>
</div>
